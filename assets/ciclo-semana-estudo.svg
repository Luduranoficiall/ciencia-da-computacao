<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 300" role="img" aria-labelledby="tw td">
  <title id="tw">Ciclo sugerido para uma semana de estudo</title>
  <desc id="td">Sete colunas, segunda a domingo: teoria nova e notas; exercícios e prova de nível; projeto com código e testes; revisão com técnica Feynman; dia de buffer para atrasos; sábado para aprofundar ou open source; domingo para descanso e planeamento da semana seguinte.</desc>
  <defs>
    <linearGradient id="wk" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#wk)"/>
  <text x="420" y="34" text-anchor="middle" fill="#f1f5f9" font-family="system-ui,Segoe UI,sans-serif" font-size="18" font-weight="700">Semana tipo (ajuste ao seu calendário)</text>
  <text x="420" y="54" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">Blocos curtos e repetição espaçada vencem maratona esporádica.</text>
  <g font-family="system-ui,sans-serif" font-size="10" font-weight="600">
    <rect x="24" y="78" width="100" height="88" rx="10" fill="#334155" stroke="#38bdf8" stroke-width="1.2"/>
    <text x="74" y="102" text-anchor="middle" fill="#e0f2fe">Seg</text>
    <text x="74" y="122" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="500">Teoria nova</text>
    <text x="74" y="140" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="400">video + notas</text>
    <rect x="132" y="78" width="100" height="88" rx="10" fill="#334155" stroke="#818cf8" stroke-width="1.2"/>
    <text x="182" y="102" text-anchor="middle" fill="#e0e7ff">Ter</text>
    <text x="182" y="122" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="500">Exercícios</text>
    <text x="182" y="140" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="400">prova de nível</text>
    <rect x="240" y="78" width="100" height="88" rx="10" fill="#334155" stroke="#34d399" stroke-width="1.2"/>
    <text x="290" y="102" text-anchor="middle" fill="#d1fae5">Qua</text>
    <text x="290" y="122" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="500">Projeto</text>
    <text x="290" y="140" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="400">código + testes</text>
    <rect x="348" y="78" width="100" height="88" rx="10" fill="#334155" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="398" y="102" text-anchor="middle" fill="#fef3c7">Qui</text>
    <text x="398" y="122" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="500">Revisão</text>
    <text x="398" y="140" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="400">Feynman + flashcards</text>
    <rect x="456" y="78" width="100" height="88" rx="10" fill="#334155" stroke="#fb7185" stroke-width="1.2"/>
    <text x="506" y="102" text-anchor="middle" fill="#ffe4e6">Sex</text>
    <text x="506" y="122" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="500">Buffer</text>
    <text x="506" y="140" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="400">atrasos / dúvidas</text>
    <rect x="564" y="78" width="100" height="88" rx="10" fill="#334155" stroke="#a78bfa" stroke-width="1.2"/>
    <text x="614" y="102" text-anchor="middle" fill="#ede9fe">Sab</text>
    <text x="614" y="122" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="500">Aprofundar</text>
    <text x="614" y="140" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="400">OSS / leitura</text>
    <rect x="672" y="78" width="144" height="88" rx="10" fill="#334155" stroke="#64748b" stroke-width="1.2"/>
    <text x="744" y="102" text-anchor="middle" fill="#f8fafc">Dom</text>
    <text x="744" y="122" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="500">Descanso + plano</text>
    <text x="744" y="140" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="400">próxima semana</text>
  </g>
  <path d="M 124 122 L 132 122 M 232 122 L 240 122 M 340 122 L 348 122 M 448 122 L 456 122 M 556 122 L 564 122 M 664 122 L 672 122" stroke="#475569" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="420" y="210" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">Troque dias ou focos — mantenha consistência e sono.</text>
  <text x="420" y="272" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="10">Exporte PNG com: convert -background none -density 200 ciclo-semana-estudo.svg ciclo-semana-estudo.png</text>
</svg>
