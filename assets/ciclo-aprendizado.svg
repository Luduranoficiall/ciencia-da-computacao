<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="t3 d3">
  <title id="t3">Ciclo de aprendizado profundo</title>
  <desc id="d3">Quatro fases em anel: estudar conteúdo, implementar em código ou experimentos, ensinar ou explicar com as próprias palavras, e medir com testes ou métricas. O centro lembra que medir fecha o ciclo.</desc>
  <rect width="100%" height="100%" fill="#18181b"/>
  <circle cx="320" cy="180" r="120" fill="none" stroke="#3f3f46" stroke-width="2"/>
  <circle cx="320" cy="180" r="95" fill="none" stroke="#52525b" stroke-width="1" stroke-dasharray="4 4"/>
  <path d="M 320 60 A 120 120 0 0 1 424 246" fill="none" stroke="#22d3ee" stroke-width="14" stroke-linecap="round"/>
  <path d="M 424 246 A 120 120 0 0 1 216 246" fill="none" stroke="#a855f7" stroke-width="14" stroke-linecap="round"/>
  <path d="M 216 246 A 120 120 0 0 1 320 60" fill="none" stroke="#f472b6" stroke-width="14" stroke-linecap="round"/>
  <text x="380" y="110" fill="#ecfeff" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="700">Estudar</text>
  <text x="320" y="300" fill="#faf5ff" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Implementar</text>
  <text x="200" y="120" fill="#fce7f3" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="700">Ensinar / explicar</text>
  <circle cx="320" cy="180" r="36" fill="#27272a" stroke="#e4e4e7" stroke-width="2"/>
  <text x="320" y="176" text-anchor="middle" fill="#fafafa" font-family="system-ui,Segoe UI,sans-serif" font-size="11" font-weight="700">Medir</text>
  <text x="320" y="190" text-anchor="middle" fill="#a1a1aa" font-family="system-ui,Segoe UI,sans-serif" font-size="9">testes · métricas</text>
  <text x="320" y="340" text-anchor="middle" fill="#71717a" font-family="system-ui,Segoe UI,sans-serif" font-size="11">Ciclo contínuo: cada volta deixa o conhecimento mais denso.</text>
</svg>
