<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" role="img" aria-labelledby="mt md">
  <title id="mt">Pré-requisitos entre disciplinas de matemática na trilha</title>
  <desc id="md">Diagrama em camadas: geometria analítica alimenta cálculo I e álgebra linear. Cálculo I alimenta probabilidade, cálculo II e métodos numéricos. Cálculo II alimenta cálculo III. Álgebra linear alimenta programação matemática. A aresta tracejada indica que métodos numéricos também exige programação I no currículo completo.</desc>
  <defs>
    <linearGradient id="mx" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <marker id="ma" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#38bdf8"/>
    </marker>
    <marker id="mda" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#mx)"/>
  <text x="360" y="32" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,Segoe UI,sans-serif" font-size="20" font-weight="700">Matemática na trilha</text>
  <text x="360" y="52" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">Tracejado: métodos numéricos também exige Prog. I (ver README).</text>
  <g font-family="system-ui,sans-serif" font-size="10" font-weight="600">
    <rect x="250" y="70" width="220" height="40" rx="8" fill="#312e81" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="360" y="95" text-anchor="middle" fill="#ede9fe">Geometria analítica</text>
    <rect x="120" y="150" width="130" height="38" rx="8" fill="#1e3a8a" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="185" y="173" text-anchor="middle" fill="#e0f2fe">Cálculo I</text>
    <rect x="470" y="150" width="150" height="38" rx="8" fill="#1e3a8a" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="545" y="173" text-anchor="middle" fill="#e0f2fe">Álgebra linear I</text>
    <rect x="40" y="235" width="150" height="38" rx="8" fill="#134e4a" stroke="#2dd4bf" stroke-width="1.5"/>
    <text x="115" y="258" text-anchor="middle" fill="#ccfbf1">Prob. e estatística</text>
    <rect x="230" y="235" width="100" height="38" rx="8" fill="#134e4a" stroke="#2dd4bf" stroke-width="1.5"/>
    <text x="280" y="258" text-anchor="middle" fill="#ccfbf1">Cálculo II</text>
    <rect x="360" y="235" width="150" height="38" rx="8" fill="#451a03" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="435" y="252" text-anchor="middle" fill="#fef3c7" font-size="9">Métodos numéricos</text>
    <text x="435" y="265" text-anchor="middle" fill="#fcd34d" font-size="7" font-weight="500">+ Prog. I (currículo)</text>
    <rect x="530" y="235" width="150" height="38" rx="8" fill="#451a03" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="605" y="258" text-anchor="middle" fill="#fef3c7">Prog. matemática / PO</text>
    <rect x="230" y="320" width="100" height="38" rx="8" fill="#831843" stroke="#fb7185" stroke-width="1.5"/>
    <text x="280" y="343" text-anchor="middle" fill="#ffe4e6">Cálculo III</text>
  </g>
  <g stroke-width="1.8" fill="none" marker-end="url(#ma)">
    <path d="M 360 110 L 185 150"/>
    <path d="M 360 110 L 545 150"/>
    <path d="M 185 188 L 115 235"/>
    <path d="M 185 188 L 280 235"/>
    <path d="M 280 273 L 280 320"/>
    <path d="M 545 188 L 605 235"/>
  </g>
  <g stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#mda)">
    <path d="M 185 188 L 435 235"/>
  </g>
  <text x="360" y="385" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">Alinhado às tabelas por etapa no README principal.</text>
</svg>
