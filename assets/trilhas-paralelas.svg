<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" role="img" aria-labelledby="t2 d2">
  <title id="t2">Trilhas paralelas de estudo</title>
  <desc id="d2">Quatro faixas horizontais: matemática; código e craft de engenharia; sistemas operacionais e redes; teoria da computação e inteligência artificial. A intensidade aumenta da esquerda para a direita.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#0c4a6e"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#sky)"/>
  <text x="440" y="38" text-anchor="middle" fill="#f8fafc" font-family="system-ui,Segoe UI,sans-serif" font-size="20" font-weight="700">Trilhas em paralelo (intensidade sugerida)</text>
  <text x="440" y="60" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="system-ui,sans-serif">Cada faixa avança com as etapas do currículo — não fique só em vídeo; projete código e escreva.</text>
  <g stroke="#334155" stroke-width="1">
    <line x1="30" y1="95" x2="850" y2="95"/>
    <line x1="30" y1="165" x2="850" y2="165"/>
    <line x1="30" y1="235" x2="850" y2="235"/>
    <line x1="30" y1="305" x2="850" y2="305"/>
  </g>
  <g font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">
    <text x="40" y="88">Matemática</text>
    <text x="40" y="158">Código e craft</text>
    <text x="40" y="228">Sistemas</text>
    <text x="40" y="298">Teoria e IA</text>
  </g>
  <g font-family="system-ui,sans-serif" font-size="10" fill="#0f172a" font-weight="600">
    <rect x="120" y="72" width="160" height="36" rx="6" fill="#7dd3fc"/>
    <text x="200" y="94" text-anchor="middle">Geo → Cálculo I–II</text>
    <rect x="300" y="72" width="160" height="36" rx="6" fill="#38bdf8"/>
    <text x="380" y="94" text-anchor="middle">Linear · Prob/Est</text>
    <rect x="480" y="72" width="160" height="36" rx="6" fill="#0ea5e9"/>
    <text x="560" y="94" text-anchor="middle">Cálculo III · Numérico</text>
    <rect x="660" y="72" width="160" height="36" rx="6" fill="#0369a1"/>
    <text x="740" y="94" text-anchor="middle" fill="#f0f9ff">Otimização</text>
    <rect x="120" y="142" width="200" height="36" rx="6" fill="#c4b5fd"/>
    <text x="220" y="164" text-anchor="middle">Git · TDD · revisão</text>
    <rect x="340" y="142" width="200" height="36" rx="6" fill="#a78bfa"/>
    <text x="440" y="164" text-anchor="middle">Libs · APIs · CI</text>
    <rect x="560" y="142" width="260" height="36" rx="6" fill="#7c3aed"/>
    <text x="690" y="164" text-anchor="middle" fill="#faf5ff">Open source · capstone</text>
    <rect x="120" y="212" width="220" height="36" rx="6" fill="#5eead4"/>
    <text x="230" y="234" text-anchor="middle">Arq. · SO · redes</text>
    <rect x="360" y="212" width="220" height="36" rx="6" fill="#2dd4bf"/>
    <text x="470" y="234" text-anchor="middle">BD · migrações · índices</text>
    <rect x="600" y="212" width="220" height="36" rx="6" fill="#0d9488"/>
    <text x="710" y="234" text-anchor="middle" fill="#ecfdf5">Dist. · observabilidade</text>
    <rect x="120" y="282" width="240" height="36" rx="6" fill="#fcd34d"/>
    <text x="240" y="304" text-anchor="middle">Autômatos · grafos</text>
    <rect x="380" y="282" width="240" height="36" rx="6" fill="#fbbf24"/>
    <text x="500" y="304" text-anchor="middle">Análise · compiladores</text>
    <rect x="640" y="282" width="180" height="36" rx="6" fill="#f59e0b"/>
    <text x="730" y="304" text-anchor="middle" fill="#1c1917">IA · DL</text>
  </g>
  <text x="440" y="370" text-anchor="middle" fill="#64748b" font-size="11" font-family="system-ui,sans-serif">Intensidade cresce da esquerda para a direita em cada faixa.</text>
</svg>
