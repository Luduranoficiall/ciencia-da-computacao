name: Links (Markdown)

on:
  push:
    branches: [main, master]
    paths:
      - "**/*.md"
      - ".github/workflows/links.yml"
      - ".lycheeignore"
  pull_request:
    branches: [main, master]
    paths:
      - "**/*.md"
      - ".github/workflows/links.yml"
      - ".lycheeignore"
  workflow_dispatch:
  schedule:
    # Segunda-feiras 08:00 UTC — detecta links mortos mesmo sem PRs
    - cron: "0 8 * * 1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: links-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Links relativos entre .md + URLs; exige https (sem http:// solto).
      - name: Verificar links em Markdown
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --max-concurrency 4
            --retry-wait-time 3
            --max-retries 3
            --require-https
            './**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Caminhos relativos com âncora (#secao): o Lychee valida o arquivo; este passo alerta se o ficheiro não existir.
  caminhos-relativos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extrair destinos relativos e testar existência
        run: |
          set -euo pipefail
          missing=0
          while IFS= read -r -d '' md; do
            dir=$(dirname "$md")
            while IFS= read -r line; do
              raw="${line#](}"
              raw="${raw%)}"
              target="${raw%%#*}"
              [[ -z "$target" ]] && continue
              case "$target" in
                http://*|https://*|mailto:*|ftp://*) continue ;;
              esac
              base="$dir/$target"
              resolved=$(realpath -m "$base")
              if [[ ! -e "$resolved" ]]; then
                echo "::error file=$md::destino inexistente: $target"
                missing=1
              fi
            done < <(grep -oE '\]\([^)]+\)' "$md" 2>/dev/null || true)
          done < <(find . -name '*.md' -not -path './.git/*' -print0)
          exit "$missing"
