name: platform-api

on:
  push:
    paths:
      - "platform/**"
      - "data/course_presentation.json"
      - "docker-compose.yml"
      - ".dockerignore"
      - ".github/workflows/platform.yml"
  pull_request:
    paths:
      - "platform/**"
      - "data/course_presentation.json"
      - "docker-compose.yml"
      - ".dockerignore"
      - ".github/workflows/platform.yml"

permissions:
  contents: read

# Evita avisos de deprecacao Node 20 nas actions (runner passa a Node 24).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: platform/requirements-dev.txt
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Sintaxe Python (compileall)
        run: python -m compileall -q app
      - name: Pytest
        run: python -m pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Docker Compose build
        run: docker compose build
