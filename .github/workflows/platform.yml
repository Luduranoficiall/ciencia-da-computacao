name: platform-api

on:
  push:
    paths:
      - "platform/**"
      - "data/course_presentation.json"
      - "docker-compose.yml"
      - ".dockerignore"
      - ".github/workflows/platform.yml"
  pull_request:
    paths:
      - "platform/**"
      - "data/course_presentation.json"
      - "docker-compose.yml"
      - ".dockerignore"
      - ".github/workflows/platform.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: platform/requirements-dev.txt
      - name: Instalar dependencias
        run: pip install -r requirements-dev.txt
      - name: Pytest
        run: pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker Compose build
        run: docker compose build
