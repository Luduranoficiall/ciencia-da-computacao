# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      dev:
        patterns:
          - "*"

  # Pip da API (FastAPI). O ecossistema "docker" do Dependabot falha por vezes com
  # Dockerfiles multi-stage / politicas do repo; atualizar a imagem base manualmente ou via PR dedicado.
  - package-ecosystem: "pip"
    directory: "/platform"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      platform-deps:
        patterns:
          - "*"
