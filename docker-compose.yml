services:
  plataforma:
    build:
      context: .
      dockerfile: platform/Dockerfile
    container_name: ciencia-computacao-platform
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/lms.db
      CURRICULUM_JSON_PATH: /app/data/curriculum.json
      COURSE_PRESENTATION_JSON_PATH: /app/data/course_presentation.json
      CONTENT_ENCRYPTION_KEY: ${CONTENT_ENCRYPTION_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-openssl-rand-hex-32}
      REQUIRE_HTTPS: "false"
      COOKIE_SAMESITE: "lax"
      CORS_ORIGINS: "*"
      TRUSTED_HOSTS: ""
      RATE_LIMIT_AUTH_PER_MINUTE: "30"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
